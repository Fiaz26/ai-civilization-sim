
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.header {
  background:#020617;
  padding:15px;
  text-align:center;
}

.container {
  padding:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

button.reject {
  background:#ef4444;
}

pre {
  background:black;
  padding:10px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Admin Dashboard</h2>
  <button onclick="loadPayments()">Refresh</button>
</div>

<div class="container" id="payments"></div>

<script>
const API = "https://ai-civilization-sim-production.up.railway.app";

/* LOAD PAYMENTS */
async function loadPayments() {
  const res = await fetch(API + "/payments");
  const data = await res.json();

  const container = document.getElementById("payments");
  container.innerHTML = "";

  data.forEach((p, index) => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>User:</b> ${p.user}<br>
      <b>Method:</b> ${p.method}<br>
      <b>Amount:</b> ${p.amount}<br>
      <b>Note:</b> ${p.note}<br>
      <b>Status:</b> ${p.status}<br><br>

      <button onclick="approve(${index})">Approve</button>
    `;

    container.appendChild(div);
  });
}

/* APPROVE PAYMENT */
async function approve(index) {
  const res = await fetch(API + "/approve?index=" + index, {
    method: "POST"
  });

  const data = await res.json();

  alert("Approved!");
  loadPayments();
}

/* AUTO LOAD */
window.onload = loadPayments;
</script>

</body>
</html>
