<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Civilization Live Dashboard</title>

<style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 15px;
  }

  h1 {
    text-align: center;
    color: #38bdf8;
  }

  button {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
  }

  .start { background: #22c55e; color: white; }
  .stop { background: #ef4444; color: white; }

  .card {
    background: #1e293b;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
  }
</style>
</head>

<body>

<h1>🌍 AI Civilization Live World</h1>

<button class="start" onclick="start()">▶ Start Simulation</button>
<button class="stop" onclick="stop()">⛔ Stop Simulation</button>

<div id="output">Click start to begin simulation</div>

<script>
const API = "https://ai-civilization-sim-production.up.railway.app";

let interval = null;

async function fetchData() {
  try {
    const res = await fetch(API + "/step");
    const data = await res.json();

    let html = `
      <div class="card">
        <h2>Tick: ${data.tick}</h2>
        <p>🌐 Global Trade: ${data.global_trade}</p>
      </div>
    `;

    data.civilizations.forEach(c => {
      html += `
        <div class="card">
          <h3>${c.id}</h3>
          <p>💰 GDP: ${c.gdp}</p>
          <p>👥 Agents: ${c.agents}</p>
          <p>🏢 Companies: ${c.companies}</p>
          <p>Status: ${c.alive ? "Alive" : "Collapsed"}</p>
        </div>
      `;
    });

    document.getElementById("output").innerHTML = html;

  } catch (err) {
    document.getElementById("output").innerHTML =
      "❌ Error: " + err.message;
  }
}

function start() {
  if (interval) return;
  fetchData();
  interval = setInterval(fetchData, 3000);
}

function stop() {
  clearInterval(interval);
  interval = null;
}
</script>

</body>
</html>
