<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Civilization Sim</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
input { padding:10px; margin:5px; width:200px; }
button { padding:10px 15px; margin:5px; cursor:pointer; }
#dashboard { display:none; margin-top:20px; }
</style>
</head>

<body>

<h1>AI Civilization Simulator</h1>

<!-- AUTH -->
<div id="auth">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <h2>Dashboard</h2>

  <button onclick="runSim()">Start Simulation</button>
  <button onclick="logout()">Logout</button>

  <pre id="output"></pre>
</div>

<script>
const API = "https://ai-civilization-sim-production.up.railway.app";

/* ---------- UI CONTROL ---------- */
function showDashboard() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
}

function showAuth() {
  document.getElementById("auth").style.display = "block";
  document.getElementById("dashboard").style.display = "none";
}

/* ---------- SIGNUP ---------- */
async function signup() {
  const res = await fetch(`${API}/signup`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.status === "success") {
    localStorage.setItem("api_key", data.api_key);
    showDashboard();
  }

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

/* ---------- LOGIN ---------- */
async function login() {
  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.status === "success") {
    localStorage.setItem("api_key", data.api_key);
    showDashboard();
  }

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

/* ---------- SIMULATION ---------- */
async function runSim() {
  const apiKey = localStorage.getItem("api_key");

  if (!apiKey) {
    alert("Please login first");
    return;
  }

  const res = await fetch(`${API}/step?api_key=${apiKey}`);
  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

/* ---------- LOGOUT ---------- */
function logout() {
  localStorage.removeItem("api_key");
  showAuth();
}

/* ---------- AUTO LOGIN ---------- */
window.onload = function() {
  const apiKey = localStorage.getItem("api_key");
  if (apiKey) {
    showDashboard();
  }
};
</script>

</body>
</html>
