<!DOCTYPE html>
<html>
<head>
  <title>AI Civilization SaaS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
    .box { max-width:400px; margin:20px auto; padding:20px; background:#1e293b; border-radius:10px; }
    input, button { width:90%; padding:10px; margin:5px; border-radius:5px; border:none; }
    button { background:#22c55e; color:white; font-weight:bold; }
  </style>
</head>

<body>

<h2>🚀 AI Civilization SaaS</h2>

<!-- LOGIN -->
<div class="box" id="authBox">
  <h3>Login / Signup</h3>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="box" id="dashboard" style="display:none;">
  <h3>Dashboard</h3>
  <button onclick="runSim()">Start Simulation</button>
  <pre id="output"></pre>

  <h3>Payment</h3>
  <input id="txn" placeholder="Transaction ID">
  <button onclick="pay()">Submit Payment</button>
</div>

<script>
const API = "https://ai-civilization-sim-production.up.railway.app";

let API_KEY = localStorage.getItem("api_key");

// auto login
if(API_KEY){
  document.getElementById("authBox").style.display="none";
  document.getElementById("dashboard").style.display="block";
}
async function signup(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  console.log("Sending signup...");

  try{
    let res = await fetch(API+"/signup", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email,password})
    });

    console.log("Response:", res);

    let data = await res.json();
    console.log("Data:", data);

    if(data.api_key){
      API_KEY = data.api_key;
      localStorage.setItem("api_key", API_KEY);
      alert("Signup success");
      location.reload();
    }else{
      alert("Signup failed: " + JSON.stringify(data));
    }

  }catch(e){
    alert("ERROR: " + e.message);
  }
      }

async function runSim(){
  try{
    let res = await fetch(API+"/step");
    let data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
  }catch(e){
    alert("Failed to fetch. Check API URL or CORS.");
  }
}

async function pay(){
  let txn = document.getElementById("txn").value;

  let res = await fetch(API+"/pay", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "api_key": API_KEY
    },
    body:JSON.stringify({txn_id:txn})
  });

  let data = await res.json();
  alert("Payment submitted");
}
</script>
