<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Civilization SaaS</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .box {
      width: 420px;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    pre {
      background: #000;
      padding: 10px;
      margin-top: 15px;
      border-radius: 8px;
      height: 200px;
      overflow: auto;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>AI Civilization SaaS</h2>

  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
  <button onclick="runSim()">Run Simulation</button>

  <pre id="output">Output...</pre>

</div>

<script>
const API = "https://ai-civilization-sim-production.up.railway.app";

/* ================= SIGNUP ================= */
async function signup() {
  try {
    const res = await fetch(`${API}/signup`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").innerText = "Signup error: " + err.message;
  }
}

/* ================= LOGIN ================= */
async function login() {
  try {
    const res = await fetch(`${API}/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").innerText = "Login error: " + err.message;
  }
}

/* ================= SIMULATION ================= */
async function runSim() {
  try {
    const res = await fetch(`${API}/step`);
    const data = await res.json();

    document.getElementById("output").innerText =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").innerText =
      "Simulation error: " + err.message;
  }
}
</script>

</body>
</html>
