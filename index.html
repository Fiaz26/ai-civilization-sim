<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI SaaS Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* AUTH */
#auth {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

input, select {
  padding:12px;
  margin:8px;
  width:260px;
  border-radius:6px;
  border:none;
}

button {
  padding:10px 15px;
  margin:6px;
  border:none;
  border-radius:6px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard { display:none; }

.header {
  background:#020617;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container { padding:20px; }

.card {
  background:#1e293b;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
}

.stats {
  display:flex;
  gap:10px;
}

.stat {
  background:#334155;
  padding:15px;
  border-radius:6px;
  flex:1;
  text-align:center;
}

pre {
  background:black;
  padding:10px;
  border-radius:6px;
  overflow:auto;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <h1>AI SaaS Platform</h1>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>

  <pre id="authOut"></pre>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="header">
    <h2>Dashboard</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <!-- STATS -->
    <div class="stats">
      <div class="stat">Tick: <span id="tick">0</span></div>
      <div class="stat">Credits: <span id="credits">0</span></div>
    </div>

    <!-- SIMULATION -->
    <div class="card">
      <h3>Simulation</h3>
      <button onclick="runSim()">Run Simulation</button>
    </div>

    <!-- PAYMENT -->
    <div class="card">
      <h3>Upgrade Plan</h3>

      <select id="method">
        <option>Bank Transfer</option>
        <option>JazzCash</option>
        <option>Easypaisa</option>
        <option>Payoneer</option>
      </select>

      <input id="amount" placeholder="Amount (e.g. 10)">
      <input id="note" placeholder="Transaction ID / Reference">

      <button onclick="submitPayment()">Submit Payment</button>
    </div>

    <!-- OUTPUT -->
    <div class="card">
      <h3>Output</h3>
      <pre id="output"></pre>
    </div>

  </div>
</div>

<script>
const API = "https://ai-civilization-sim-production.up.railway.app";

let apiKey = "";

/* UI CONTROL */
function showDashboard() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
}

function showAuth() {
  document.getElementById("auth").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
}

/* SIGNUP */
async function signup() {
  const res = await fetch(API + "/signup", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();

  if (data.status === "success") {
    apiKey = data.api_key;
    localStorage.setItem("api_key", apiKey);
    document.getElementById("credits").innerText = data.credits;
    showDashboard();
  }

  document.getElementById("authOut").innerText =
    JSON.stringify(data, null, 2);
}

/* LOGIN */
async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();

  if (data.status === "success") {
    apiKey = data.api_key;
    localStorage.setItem("api_key", apiKey);
    document.getElementById("credits").innerText = data.credits;
    showDashboard();
  }

  document.getElementById("authOut").innerText =
    JSON.stringify(data, null, 2);
}

/* SIMULATION */
async function runSim() {
  const res = await fetch(API + "/step?api_key=" + apiKey);
  const data = await res.json();

  if (data.error) {
    document.getElementById("output").innerText =
      "❌ " + data.error;
    return;
  }

  document.getElementById("tick").innerText = data.tick;
  document.getElementById("credits").innerText = data.credits_left;

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

/* PAYMENT */
async function submitPayment() {
  const res = await fetch(API + "/request-payment", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      api_key: apiKey,
      method: document.getElementById("method").value,
      amount: parseFloat(document.getElementById("amount").value),
      note: document.getElementById("note").value
    })
  });

  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

/* LOGOUT */
function logout() {
  localStorage.removeItem("api_key");
  apiKey = "";
  showAuth();
}

/* AUTO LOGIN */
window.onload = function() {
  const saved = localStorage.getItem("api_key");
  if (saved) {
    apiKey = saved;
    showDashboard();
  }
};
</script>

</body>
</html>
